modLoader = "javafml"
loaderVersion = "[4,)"

license = "MIT"

[[mods]]
modId = "create_web_board"
version = "${version}"
displayName = "Create Web Board"
authors = "hedaas"
# Server-required, client-optional: clients without this mod can still connect.
# IGNORE_SERVER_VERSION lets the client skip the server's mod version check, so
# no "mod mismatch" disconnect is triggered when the client doesn't have it.
displayTest = "IGNORE_SERVER_VERSION"
description = '''
Adds a "Web" toggle to every Display Link. When enabled, the link's live output is
mirrored to a local browser dashboard in real time. This file is generated from
${version} — see build.gradle processResources.
'''

[[mixins]]
config = "mixins.create_web_board.json"

[[dependencies.create_web_board]]
    modId = "minecraft"
    type = "required"
    versionRange = "[1.21.1,1.22)"
    side = "BOTH"

[[dependencies.create_web_board]]
    modId = "neoforge"
    type = "required"
    versionRange = "[21.1.219,)"
    side = "BOTH"

[[dependencies.create_web_board]]
    modId = "create"
    type = "required"
    versionRange = "[6.0.10,)"
    side = "BOTH"

[[dependencies.create_web_board]]
    modId = "flywheel"
    type = "optional"
    versionRange = "[1.0.6,)"
    side = "BOTH"

[[dependencies.create_web_board]]
    modId = "ponder"
    type = "optional"
    versionRange = "[1.0.82,)"
    side = "BOTH"