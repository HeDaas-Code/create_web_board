<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Web Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <header class="topbar">
        <span class="brand">
            <span class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            </span>
            <span class="brand-text">Create Web Board</span>
        </span>

        <span class="status pill" id="status" title="WebSocket connection">
            <span class="dot dot-off" id="status-dot"></span>
            <span id="status-text">connecting…</span>
        </span>

        <span class="spacer"></span>

        <span class="metric" title="Mirrored boards"><span id="board-count">0</span> boards</span>
        <span class="metric sep" title="WebSocket clients"><span id="ws-count">0</span> ws</span>
        <span class="clock" id="clock" title="Local time">--:--:--</span>
    </header>

    <main class="layout">
        <aside class="sidebar">
            <div class="sidebar-search">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
                <input id="search" type="search" placeholder="Filter boards…" autocomplete="off" />
            </div>
            <ul class="board-list" id="board-list">
                <li class="empty">
                    <span class="empty-icon">⌖</span>
                    No boards yet.
                    <span class="empty-hint">Place a Display Link, open it, and toggle <b>Web: ON</b>.</span>
                </li>
            </ul>
        </aside>

        <section class="main">
            <div class="main-header">
                <div class="title-block">
                    <h2 id="selected-name">Select a board</h2>
                    <span class="chips" id="chips"></span>
                </div>
                <span class="live" id="live-badge" hidden><span class="live-dot"></span> live</span>
            </div>

            <div class="board-content" id="board-content">
                <div class="placeholder" id="placeholder">
                    <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                    <p>Click a board on the left to view its live content.</p>
                </div>
                <ol class="lines" id="lines"></ol>
            </div>

            <div class="main-footer">
                <span id="updated">—</span>
                <span class="dot-sep">·</span>
                <span id="line-count">0 lines</span>
                <span class="spacer"></span>
                <span class="hint">Auto-updating · <code>http://localhost:8080</code></span>
            </div>
        </section>
    </main>

    <script src="/app.js"></script>
</body>
</html>
