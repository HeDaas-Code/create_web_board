<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Web Board · 看板</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <header class="topbar">
        <span class="brand">
            <span class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            </span>
            <span class="brand-text">Create Web Board</span>
        </span>

        <label class="search-box">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input id="search" type="search" placeholder="搜索看板…" autocomplete="off" />
        </label>

        <span class="spacer"></span>

        <span class="stat" title="当前看板数"><b id="board-count">0</b> 看板</span>
        <span class="stat" title="WebSocket 连接数"><b id="ws-count">0</b> 连接</span>

        <span class="status pill" id="status" title="WebSocket 连接状态">
            <span class="dot dot-off" id="status-dot"></span>
            <span id="status-text">连接中…</span>
        </span>

        <span class="clock" id="clock" title="本地时间">--:--:--</span>
    </header>

    <main class="board-grid" id="board-grid" aria-live="polite"></main>

    <section class="empty-state" id="empty-state">
        <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <h2>还没有看板</h2>
        <p>放置一个 Display Link，打开它的配置界面，开启 <b>Web: ON</b> 开关，<br/>它的实时输出就会作为一个卡片出现在这里。</p>
        <p class="hint">每多开启一个 Display Link 的 Web 开关，这里就多一个信息卡片。</p>
        <p class="hint">服务地址 <code>http://localhost:8080</code> · 自动实时更新</p>
    </section>

    <!-- Board detail modal: opened by clicking a card. Edit display name, view history, delete. -->
    <div class="modal-overlay" id="modal" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-h">
            <header class="modal-head">
                <h2 class="modal-title" id="modal-title-h">看板详情</h2>
                <button class="modal-close" id="modal-close" aria-label="关闭" title="关闭">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </header>

            <div class="modal-body">
                <!-- Rename section -->
                <section class="modal-section">
                    <label class="modal-label" for="modal-name-input">显示名称</label>
                    <div class="rename-row">
                        <input id="modal-name-input" type="text" maxlength="64" placeholder="留空则使用位置名称" autocomplete="off" />
                        <button id="modal-save-name" class="btn btn-primary">保存</button>
                    </div>
                    <p class="modal-subtitle" id="modal-key-hint"></p>
                </section>

                <!-- Current content snapshot -->
                <section class="modal-section">
                    <h3 class="modal-section-title">当前内容</h3>
                    <ol class="modal-lines" id="modal-current-lines"></ol>
                </section>

                <!-- History -->
                <section class="modal-section">
                    <div class="modal-section-head">
                        <h3 class="modal-section-title">历史信息</h3>
                        <span class="modal-section-meta" id="modal-history-count"></span>
                    </div>
                    <div class="modal-history" id="modal-history" aria-live="polite"></div>
                </section>
            </div>

            <footer class="modal-foot">
                <span class="modal-foot-meta" id="modal-foot-meta"></span>
                <span class="spacer"></span>
                <button id="modal-delete" class="btn btn-danger">删除看板</button>
            </footer>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
