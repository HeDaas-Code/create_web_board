# Release workflow: build the mod and attach the .jar to a GitHub Release.
# Trigger: push of a tag matching v* (e.g. v0.1.0, v0.2.0-rc1).
# Downloads on the release page are direct .jar — no zip wrapping.
#
# Verified 2026-06-26: same gradle build as the regular CI (./gradlew build).
# The .jar lands in build/libs/create_web_board-1.21.1-*.jar.

name: release

on:
  push:
    tags:
      - 'v*'        # matches v0.1.0, v1.2.3, v0.2.0-rc1, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # needed to create / edit the release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (cache wrapper)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Build the mod jar
        run: gradle build --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx3G -Dfile.encoding=UTF-8"

      - name: Extract version from tag
        id: version
        run: |
          # Strip the leading 'v' from the tag (e.g. v0.1.0 → 0.1.0)
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sanity-check mods.toml
        run: |
          set -e
          JAR=$(ls build/libs/*.jar | head -1)
          echo "Built jar: $JAR"
          test -f "$JAR"
          unzip -p "$JAR" META-INF/neoforge.mods.toml | tee /tmp/mods.toml
          grep -q 'modId *= *"create"' /tmp/mods.toml
          grep -q 'modId *= *"neoforge"' /tmp/mods.toml
          echo "✅ mods.toml sanity OK"

      - name: Create GitHub Release with .jar attached
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            build/libs/*.jar
          # Do NOT zip the artifact — softprops attaches the .jar directly, and the
          # release page downloads it as a single file with the original name.
          fail_on_unmatched_files: true
