# Release workflow: build the mod and attach the .jar to a GitHub Release whose body
# is the matching entry from CHANGELOG.md.
#
# Trigger: push of a tag matching v* (e.g. v0.1.0, v0.2.0-rc1).
# Downloads on the release page are direct .jar — no zip wrapping.
#
# Release notes policy: the body is extracted from the `## [x.y.z]` section of
# CHANGELOG.md (everything between that heading and the next `## [` heading, excluding
# the trailing horizontal rule). If the section is missing the job fails loudly — a
# release without explicit "what changed" notes is not allowed.
#
# Version policy: tags are pushed ONLY when the maintainer explicitly requests a release.
# Do NOT push v* tags as part of normal feature work — see README.md "Release policy".

name: release

on:
  push:
    tags:
      - 'v*'        # matches v0.1.0, v1.2.3, v0.2.0-rc1, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # needed to create / edit the release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (cache wrapper)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Build the mod jar
        run: gradle build --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx3G -Dfile.encoding=UTF-8"

      - name: Extract version from tag
        id: version
        run: |
          # Strip the leading 'v' from the tag (e.g. v0.1.0 → 0.1.0)
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          set -e
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Extracting release notes for [${VERSION}] from CHANGELOG.md"
          #
          # Match the heading `## [x.y.z] - YYYY-MM-DD` (date optional, so rc/pre-release
          # entries without a date still work). Capture from the line AFTER the heading
          # down to (but not including) the next `## [` heading or a standalone `---` rule.
          # Then trim trailing blank lines and any trailing horizontal rule.
          NOTES=$(awk -v ver="[${VERSION}]" '
            BEGIN { in_section = 0 }
            # Entering the target section: a level-2 heading whose bracketed id matches.
            /^## \[/ {
              if (in_section) { exit }       # next ## [ section begins → stop
              if (index($0, ver) > 0) { in_section = 1; next }
              next
            }
            # Stop at a standalone horizontal rule or the start of an HTML comment block
            # (e.g. the release-notes template at the bottom of the file).
            in_section {
              if ($0 ~ /^---[[:space:]]*$/ || $0 ~ /^<!--/) { exit }
              print
            }
          ' CHANGELOG.md)

          # Trim trailing blank lines.
          NOTES=$(printf '%s' "$NOTES" | sed -e :a -e '/^[[:space:]]*$/{N;ba}')

          if [ -z "$NOTES" ]; then
            echo "::error::No \`## [${VERSION}]\` entry found in CHANGELOG.md. Add one before tagging."
            exit 1
          fi

          # Persist to a file so the multi-line value survives the GITHUB_OUTPUT round-trip.
          # Use a unique delimiter to avoid collisions with note content, and ensure the
          # content ends with a newline so the closing delimiter is on its own line.
          printf '%s\n' "$NOTES" > /tmp/release-notes.md
          {
            echo "notes<<RELEASE_NOTES_DELIMITER"
            cat /tmp/release-notes.md
            echo "RELEASE_NOTES_DELIMITER"
          } >> "$GITHUB_OUTPUT"
          echo "----- Extracted release notes (${#NOTES} chars) -----"
          cat /tmp/release-notes.md
          echo "---------------------------------------------------"

      - name: Sanity-check mods.toml
        run: |
          set -e
          JAR=$(ls build/libs/*.jar | head -1)
          echo "Built jar: $JAR"
          test -f "$JAR"
          unzip -p "$JAR" META-INF/neoforge.mods.toml | tee /tmp/mods.toml
          grep -q 'modId *= *"create"' /tmp/mods.toml
          grep -q 'modId *= *"neoforge"' /tmp/mods.toml
          echo "✅ mods.toml sanity OK"

      - name: Create GitHub Release with .jar attached
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          # Body comes from the CHANGELOG.md entry extracted above — NOT GitHub's
          # auto-generated commit/PR list. Every release must say what changed.
          body: ${{ steps.notes.outputs.notes }}
          files: |
            build/libs/*.jar
          # Do NOT zip the artifact — softprops attaches the .jar directly, and the
          # release page downloads it as a single file with the original name.
          fail_on_unmatched_files: true
